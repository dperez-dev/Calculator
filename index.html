<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="styleSheet" href="style.css">
</head>
<body>
    <div id="mainBody">
        <div class="containers" id="test">
            <div id="display"></div>
            <div id="previosExp"></div>
        </div>
        <div class="containers">
            <div class="rowContainer">
                <button class=" btnOper calcBtn" data-value="(">(</button>
                <button class=" btnOper calcBtn" data-value=")" >)</button>
                <button class=" btnOper calcBtn" data-value="%">%</button>
                <button class=" btnClear calcBtn">clear</button>
            </div>
            <div class="rowContainer">
                <button class=" btnOper calcBtn" data-value="+">+</button>
                <button class=" btnOper calcBtn" data-value="-">-</button>
                <button class=" btnOper calcBtn" data-value="*">*</button>
                <button class=" btnOper calcBtn" data-value="/">/</button>
            </div>
            <div class="rowContainer">
                <button class=" btnNum calcBtn" data-value="1">1</button>
                <button class=" btnNum calcBtn" data-value="2">2</button>
                <button class=" btnNum calcBtn" data-value="3">3</button>
                <button class=" btnOper calcBtn" data-value="^">^</button>
            </div>
            <div class="rowContainer">
                <button class=" btnNum calcBtn" data-value="4">4</button>
                <button class=" btnNum calcBtn" data-value="5">5</button>
                <button class=" btnNum calcBtn" data-value="6">6</button>
                <button class=" btnNegative calcBtn">(-)</button>
            </div>
            <div class="rowContainer">
                <button class=" btnNum calcBtn" data-value="7">7</button>
                <button class=" btnNum calcBtn" data-value="8">8</button>
                <button class=" btnNum calcBtn" data-value="9">9</button>
                <button class=" btnOper calcBtn" data-value=".">.</button>
            </div>
            <div class="rowContainer">
                <button class=" calcBtn" data-value="0">0</button>
                <button class=" calcBtn" ></button>
                <button class=" calcBtn" ></button>
                <button class=" calcBtn" >Enter</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
